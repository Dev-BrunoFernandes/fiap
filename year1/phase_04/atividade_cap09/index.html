<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/images/logo.png" type="image/x-icon">

<!-- == == == Styles == == == -->
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet"
          crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">
  
</head>
<body class="overflow-hidden pt-5 px-3 bg-black text-bg-primary">
    <div class="container text-center px-0 container-login">
        <h1 class="display-6">Crie Uma Conta</h1>
        <p class="lead mb-5">Insira seus dados pessoais para criar sua conta.</p>

        <!-- Login Options -->
        <div class="row g-0">
            <a href="#" class="col btn btn-outline-light me-2">
                <img src="./assets/images/google.png" alt="Google" class="pe-2">
                Google
            </a>
            <a href="#" class="col btn btn-outline-light ms-2">
                <img src="./assets/images/github.png" alt="Github" class="pe-2">
                Github
            </a>
        </div>

        <!-- Divider -->
        <div class="position-relative py-4">
            <hr>
            <span class="position-absolute top-50 start-50 translate-middle bg-black px-2">
                ou
            </span>
        </div>

        <!-- Register Form -->
        <form class="text-start">
            <div class="row g-0 mb-4">
                <div class="col-6 pe-2 text-start">
                    <!-- First Name Input -->
                    <label for="input1" class="form-label">Nome</label>
                    <input type="text" class="form-control input-custom border-0" id="input1" placeholder="Ex. Bruno">
                </div>

                <div class="col-6 ps-2 text-start">
                    <!-- Last Name Input -->
                    <label for="input2" class="form-label">Sobrenome</label>
                    <input type="text" class="form-control input-custom border-0" id="input2" placeholder="Ex. Fernandes">
                </div>
            </div>

            <!-- Email Input -->
            <label for="input2" class="form-label">Sobrenome</label>
            <input type="text" class="form-control input-custom border-0 mb-4" id="input2" placeholder="Ex. Fernandes">

            <!-- Password Input -->
            <label for="input2" class="form-label">Sobrenome</label>
            <input type="text" class="form-control input-custom border-0 mb-2" id="input2" placeholder="Ex. Fernandes">
            <p class="lead fs-6 password-p">Deve ter no mínimo 8 caracteres.</p>

            <!-- Submit Button -->
            <a href="#" class="btn btn-custom w-100 mb-4">
                Registrar
            </a>
        </form>

        <p class="lead fs-6">
            Já possui uma conta?
            <a href="#" class="link-custom text-decoration-none">Entrar</a>
        </p>
    </div>

<!-- == == == Scripts == == == -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
    </script>
</body>
</html>
